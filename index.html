<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Sayfa</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  font-family:Arial;
}

/* 🎉 CONFETTI */
.confetti{
  position:fixed;
  width:6px;
  height:6px;
  top:-10px;
  opacity:0.5;
  animation:fall linear infinite;
  z-index:-1;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* 🎬 INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

#logo{
  font-family:'Bebas Neue', sans-serif;
  font-size:60px;
  color:#e50914;
  text-shadow:0 0 15px #e50914, 0 0 40px #e50914;
  animation:intro 5s ease forwards;
}

@keyframes intro{
  0%{opacity:0;transform:scale(0.5);filter:blur(15px)}
  20%{opacity:1;transform:scale(1.1);filter:blur(2px)}
  50%{opacity:1;filter:blur(0)}
  100%{opacity:0;transform:scale(1.2)}
}

/* 🔐 LOCK */
#lock{
  display:none;
  flex-direction:column;
}

input{
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* 📜 CONTENT */
#content{
  display:none;
  max-width:600px;
  padding:20px;
  line-height:1.6;
}

/* 💌 MESSAGE (SIKI TASARIM) */
#text{
  font-size:16px;
  letter-spacing:0.3px;
  line-height:1.4; /* 🔥 DARALTILDI */
  text-shadow:0 0 10px rgba(255,255,255,0.08);
}

/* 🎧 MUSIC BUTTON */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:10;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff4d6d,#4cc9f0);
  color:white;
  cursor:pointer;
  box-shadow:0 0 15px rgba(255,77,109,0.6);
}
</style>
</head>

<body>

<!-- 🎉 CONFETTI -->
<div id="confetti"></div>

<!-- 🎧 MUSIC -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎬 INTRO -->
<div id="intro">
  <div id="logo">DOĞUM GÜNÜN KUTLU OLSUN</div>
</div>

<!-- 🔐 LOCK -->
<div id="lock">
  <h2>Bu sayfa sana özel 🔐</h2>
  <p style="font-size:12px;opacity:0.7">İpucu: Eski telefon şifren (4 haneli)</p>
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="check()">Giriş</button>
</div>

<!-- 📜 CONTENT -->
<div id="content">
  <h1>İyi ki doğdun çatlak fıstık 🎂</h1>
  <p id="text"></p>
</div>

<!-- 🎧 MUSIC BUTTON -->
<button id="musicBtn" onclick="toggleMusic()">🎧 Müziği Başlat</button>

<script>

// 🎉 CONFETTI
function createConfetti(){
  for(let i=0;i<45;i++){
    let c=document.createElement("div");
    c.classList.add("confetti");

    c.style.left=Math.random()*100+"vw";
    c.style.background=randomColor();
    c.style.animationDuration=(4+Math.random()*4)+"s";
    c.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(c);
  }
}

function randomColor(){
  const colors=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0","#f72585","#aaa"];
  return colors[Math.floor(Math.random()*colors.length)];
}

createConfetti();

// 💌 MESSAGE
const message = `Asya...

Bazen bazı insanlar hayatımıza uzun süre kalmak için değil,
çok kısa anlarda girip uzun izler bırakmak için gelir.

Sen de benim hayatımda böyle bir yer bıraktın.

Bazen bir gülüş,
bazen bir konuşma,
insanın içindeki en sakin yeri bile değiştirebiliyor.

Seninle geçen o kısa zaman,
uzun yıllara sığacak kadar değerliydi.

İyi ki doğdun...`;

// ✍️ TYPE EFFECT (KOMPAKT)
let i = 0;
let textEl = document.getElementById("text");

function type(){
  if(i < message.length){
    let char = message[i];

    if(char === "\n"){
      textEl.innerHTML += "<br>"; // 🔥 DARALTILDI
    } else {
      textEl.innerHTML += char;
    }

    i++;
    setTimeout(type,60);
  }
}

// 🖥️ FULLSCREEN
function openFullscreen(){
  let elem=document.documentElement;
  if(elem.requestFullscreen){
    elem.requestFullscreen().catch(()=>{});
  }
}

// 🎧 MUSIC CONTROL
let music=document.getElementById("bgMusic");
let musicStarted=false;

function toggleMusic(){
  if(!musicStarted){
    music.volume=0.4;
    music.play().catch(()=>{});
    musicStarted=true;
    document.getElementById("musicBtn").innerText="⏸ Müziği Durdur";
  } else {
    music.pause();
    musicStarted=false;
    document.getElementById("musicBtn").innerText="🎧 Müziği Başlat";
  }
}

// 🚀 INTRO
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },5000);
};

// 🔐 LOGIN
function check(){
  if(document.getElementById("pass").value==="3007"){

    logUser();
    openFullscreen();

    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";

    type();

  } else {
    alert("Yanlış şifre ❌");
  }
}

// 📊 FIREBASE LOG
const DB_URL="https://dogum-d1b8a-default-rtdb.europe-west1.firebasedatabase.app/logs.json";

function logUser(){
  fetch(DB_URL,{
    method:"POST",
    body:JSON.stringify({
      time:new Date().toLocaleString(),
      device:navigator.userAgent,
      language:navigator.language,
      screen:`${window.innerWidth}x${window.innerHeight}`,
      platform:navigator.platform
    })
  }).catch(()=>{});
}

</script>

</body>
</html>
